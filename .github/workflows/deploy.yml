name: Deploy to Cloudflare Pages

# Trigger: every push to main, and PRs (which deploy to a preview URL).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual fire from the Actions tab if needed.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed by wrangler-action to comment preview URL on PRs.
      deployments: write
      pull-requests: write
    name: Build + deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=turn-a-phrase --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
